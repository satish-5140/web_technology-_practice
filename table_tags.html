<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            margin: 0 auto;
            border-collapse: separate;
            border-spacing: 0;
        }
        th, td {
            border: 1px solid #000;
            padding: 8px;
        }
        thead th {
            color: blue;
            background-color: lightgrey;
        }
        caption {
            caption-side: top;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <table>
        <caption>Sunrise High School</caption>
        <thead>
            <tr>
                <th>srno</th>
                <th>name</th>
                <th>age</th>
                <th>marks</th>
                <th>totalmarks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>John</td>
                <td rowspan="5">25</td>
                <td>95</td>
                <td>95</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Jane</td>
                <td>88</td>
                <td>88</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Alex</td>
                <td>92</td>
                <td>92</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Maria</td>
                <td>90</td>
                <td>90</td>
            </tr>
            <tr>
                <td>5</td>
                <td>Sam</td>
                <td>87</td>
                <td>87</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4" style="text-align:right; font-weight:bold;">Total marks =</td>
                <td>452</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
