<!DOCTYPE html>
<html lang="en">
<head>

    <title>Main Frame Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;

            width: 100%;

            border: none;
        }

        <h1>Main Page with Nested Frames</h1>
        <div class="frame-box">
