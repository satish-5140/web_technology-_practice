<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Link Examples</h1>

    <h2>1. External Link</h2>
    <p><a href="https://www.example.com" target="_blank" rel="noopener noreferrer">Visit Example.com</a></p>

    <h2>2. Email Link</h2>
    <p><a href="mailto:hello@example.com">Send an email to hello@example.com</a></p>

    <h2>3. Anchor Link</h2>
    <p><a href="#section-two">Jump to Section Two</a></p>

    <h2 id="section-two">Section Two</h2>
    <p>This is the target section for the anchor link.</p>

    <h2>4. Download Link</h2>
    <p><a href="sample-file.txt" download>Download a sample text file</a></p>
</body>
</html>
